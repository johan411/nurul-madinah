services:
  - type: web
    name: nurul-madinah-app
    env: php
    region: singapore
    branch: main
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      mkdir -p storage/framework/{sessions,views,cache}
      chmod -R 777 storage bootstrap/cache
    startCommand: |
      php artisan migrate --force
      vendor/bin/heroku-php-apache2 public/
    envVars:
      - key: APP_NAME
        value: "Nurul Madinah"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          name: nurul-madinah-app
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: nurul-madinah-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: nurul-madinah-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: nurul-madinah-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: nurul-madinah-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: nurul-madinah-db
          property: password

  - type: pserv
    name: nurul-madinah-db
    databaseName: nurul_madinah
    plan: free
    databaseUrl: $DATABASE_URL